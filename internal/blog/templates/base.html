<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <meta name="generator" content="OSS Blog">
  <meta name="powered-by" content="oss-sync">

  <link rel="stylesheet" href="/themes/{{.ThemeName}}/style.css">
  <script defer src="/themes/{{.ThemeName}}/theme.js"></script>

  <script>window.__THEME_CONFIG__ = {{.ThemeConfigJS}};</script>

  {{if .CustomHeader}}{{.CustomHeader}}{{end}}
</head>
<body>
  <article class="oss-content">
    {{- if .IsFolder -}}
      <h1 class="oss-folder-title">{{.FolderTitle}}</h1>
      <nav class="oss-tree">
        {{.ContentHTML}}
      </nav>
    {{- else -}}
      {{.ContentHTML}}
    {{- end -}}
  </article>

  {{if .CustomFooter}}{{.CustomFooter}}{{end}}

  {{if .FooterNotice}}
  <div class="oss-notice">{{.FooterNotice}}</div>
  {{end}}
</body>
</html>
